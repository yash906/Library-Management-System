{% extends 'transactions.html' %}
{% block title %}Return Book{% endblock %}
{% block txn_body %}
<h2>Return Book</h2>

<form method="post" action="{{ url_for('return_book') }}">
  <input type="hidden" id="issue_id" name="issue_id" value="">

  <label for="book_name">Enter Book Name <span class="required">*</span></label>
  <select id="book_name" required>
    <option value="">-- Select Book Name --</option>
    {% for book in issued_books %}
      <option value="{{ book.serial_no }}" data-author="{{ book.author }}" data-issue="{{ book.issue_date }}" data-return="{{ book.return_date }}" data-issueid="{{ book.issue_id }}">{{ book.title }}</option>
    {% endfor %}
  </select>

  <label for="author_display">Enter Author</label>
  <input id="author_display" type="text" readonly disabled placeholder="Auto-populated">

  <label for="serial_no">Serial No <span class="required">*</span></label>
  <select id="serial_no" name="serial_no_display" required>
    <option value="">-- Select Serial No --</option>
    {% for book in issued_books %}
      <option value="{{ book.serial_no }}" data-title="{{ book.title }}" data-author="{{ book.author }}" data-issue="{{ book.issue_date }}" data-return="{{ book.return_date }}" data-issueid="{{ book.issue_id }}">{{ book.serial_no }}</option>
    {% endfor %}
  </select>

  <label for="issue_date">Issue Date</label>
  <input id="issue_date" type="date" readonly disabled>

  <label for="return_date">Return Date <span class="required">*</span></label>
  <input id="return_date" name="return_date" type="date" required>

  <label for="remarks">Remarks (Non Mandatory)</label>
  <textarea id="remarks" name="remarks" placeholder="Remarks"></textarea>

  <div class="txn-actions">
    <a class="btn secondary" href="{{ url_for('transactions') }}">Cancel</a>
    <button class="btn" type="submit">Confirm</button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
var bookSelect = document.getElementById('book_name');
var serialSelect = document.getElementById('serial_no');
var authorDisplay = document.getElementById('author_display');
var issueDateInput = document.getElementById('issue_date');
var returnDateInput = document.getElementById('return_date');
var issueIdInput = document.getElementById('issue_id');

function populateFromBook() {
  var opt = bookSelect.options[bookSelect.selectedIndex];
  if (!opt.value) {
    authorDisplay.value = '';
    issueDateInput.value = '';
    returnDateInput.value = '';
    issueIdInput.value = '';
    serialSelect.value = '';
    return;
  }
  authorDisplay.value = opt.dataset.author || '';
  issueDateInput.value = opt.dataset.issue || '';
  returnDateInput.value = opt.dataset['return'] || '';
  issueIdInput.value = opt.dataset.issueid || '';
  serialSelect.value = opt.value;
}

function populateFromSerial() {
  var opt = serialSelect.options[serialSelect.selectedIndex];
  if (!opt.value) {
    authorDisplay.value = '';
    issueDateInput.value = '';
    returnDateInput.value = '';
    issueIdInput.value = '';
    bookSelect.value = '';
    return;
  }
  authorDisplay.value = opt.dataset.author || '';
  issueDateInput.value = opt.dataset.issue || '';
  returnDateInput.value = opt.dataset['return'] || '';
  issueIdInput.value = opt.dataset.issueid || '';
  // Sync book dropdown by serial_no value
  for (var i = 0; i < bookSelect.options.length; i++) {
    if (bookSelect.options[i].value === opt.value) {
      bookSelect.selectedIndex = i;
      break;
    }
  }
}

bookSelect.addEventListener('change', populateFromBook);
serialSelect.addEventListener('change', populateFromSerial);
</script>
{% endblock %}
