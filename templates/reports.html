{% extends 'base.html' %}
{% block title %}Reports{% endblock %}
{% block content %}
<div class="txn-layout">
  <aside class="txn-sidebar">
    <nav class="txn-nav">
      <a class="txn-nav-item {% if active_tab == 'active_issues' %}active{% endif %}"
         href="{{ url_for('report_active_issues') }}">Active Issues</a>
      <a class="txn-nav-item {% if active_tab == 'memberships' %}active{% endif %}"
         href="{{ url_for('report_memberships') }}">Memberships</a>
      <a class="txn-nav-item {% if active_tab == 'books' %}active{% endif %}"
         href="{{ url_for('report_books') }}">Books</a>
      <a class="txn-nav-item {% if active_tab == 'movies' %}active{% endif %}"
         href="{{ url_for('report_movies') }}">Movies</a>
      <a class="txn-nav-item {% if active_tab == 'overdue' %}active{% endif %}"
         href="{{ url_for('report_overdue') }}">Overdue Returns</a>
      <a class="txn-nav-item {% if active_tab == 'pending' %}active{% endif %}"
         href="{{ url_for('report_pending') }}">Pending Requests</a>
    </nav>
  </aside>

  <section class="txn-content">
    {% block report_body %}
    <div class="txn-welcome">
      <h2>Reports</h2>
      <p>Select a report from the sidebar to view.</p>
    </div>
    {% endblock %}
  </section>
</div>
{% endblock %}
