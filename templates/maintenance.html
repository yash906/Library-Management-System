{% extends 'base.html' %}
{% block title %}Maintenance{% endblock %}
{% block content %}
<div class="txn-layout">
  <aside class="txn-sidebar">
    <nav class="txn-nav">
      <a class="txn-nav-item {% if active_tab == 'add_membership' %}active{% endif %}"
         href="{{ url_for('add_membership') }}">Add Membership</a>
      <a class="txn-nav-item {% if active_tab == 'update_membership' %}active{% endif %}"
         href="{{ url_for('update_membership') }}">Update Membership</a>
      <a class="txn-nav-item {% if active_tab == 'add_item' %}active{% endif %}"
         href="{{ url_for('add_item') }}">Add Book / Movie</a>
      <a class="txn-nav-item {% if active_tab == 'update_item' %}active{% endif %}"
         href="{{ url_for('update_item') }}">Update Book / Movie</a>
      <a class="txn-nav-item {% if active_tab == 'manage_user' %}active{% endif %}"
         href="{{ url_for('manage_user') }}">User Management</a>
    </nav>
  </aside>

  <section class="txn-content">
    {% block maint_body %}
    <div class="txn-welcome">
      <h2>Maintenance</h2>
      <p>Select an option from the sidebar to get started.</p>
    </div>
    {% endblock %}
  </section>
</div>
{% endblock %}
