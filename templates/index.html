{% extends 'base.html' %}
{% block title %}Welcome | Library Management{% endblock %}
{% block content %}
<section class="hero">
  <h1>Library Management System</h1>
  <p>Select your login type to get started.</p>
  <div class="grid two">
    <div class="card login-card" style="text-align:center;">
      <h2>Admin Login</h2>
      <a class="btn" href="{{ url_for('admin_login') }}" style="display:inline-block;margin-top:12px;text-decoration:none;">Login as Admin</a>
    </div>
    <div class="card login-card" style="text-align:center;">
      <h2>User Login</h2>
      <a class="btn" href="{{ url_for('user_login') }}" style="display:inline-block;margin-top:12px;text-decoration:none;">Login as User</a>
    </div>
  </div>
</section>
{% endblock %}
