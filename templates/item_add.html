{% extends 'maintenance.html' %}
{% block title %}Add Book / Movie{% endblock %}
{% block maint_body %}
<h2>Add Book / Movie</h2>
<form id="add-item-form" method="post" action="{{ url_for('add_item') }}" onsubmit="return validateForm()">
  <label>Type <span class="required">*</span></label>
  <div class="radio-group">
    <label class="radio-label"><input type="radio" name="item_type" value="book" checked> Book (default)</label>
    <label class="radio-label"><input type="radio" name="item_type" value="movie"> Movie</label>
  </div>

  <label for="title">Title <span class="required">*</span></label>
  <input id="title" name="title" type="text" required>

  <label for="author">Author / Director <span class="required">*</span></label>
  <input id="author" name="author" type="text" required>

  <label for="category">Category <span class="required">*</span></label>
  <select id="category" name="category" required>
    <option value="">-- Select Category --</option>
    {% for cat in categories %}
      <option value="{{ cat }}">{{ cat }}</option>
    {% endfor %}
  </select>

  <p class="notice">Serial number will be auto-generated based on category and type.</p>

  <div id="form-error" class="alert error" style="display:none;"></div>

  <div class="txn-actions">
    <a class="btn secondary" href="{{ url_for('maintenance') }}">Cancel</a>
    <button class="btn" type="submit">Add Item</button>
  </div>
</form>
{% endblock %}

{% block scripts %}
<script>
function validateForm() {
  var title = document.getElementById('title').value.trim();
  var author = document.getElementById('author').value.trim();
  var category = document.getElementById('category').value;
  var errorDiv = document.getElementById('form-error');

  if (!title || !author || !category) {
    errorDiv.textContent = 'All fields are mandatory. Please fill in every field.';
    errorDiv.style.display = 'block';
    return false;
  }
  errorDiv.style.display = 'none';
  return true;
}
</script>
{% endblock %}
